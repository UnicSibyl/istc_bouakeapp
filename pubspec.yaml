name: istc_bouakeapp
description: "Application mobile de l'ISTC Polytechnique Bouaké"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

  fonts:
    - family: DMSans
      fonts:
        - asset: assets/fonts/DM_Sans-Regular.ttf
        - asset: assets/fonts/DM_Sans-Medium.ttf
        - asset: assets/fonts/DM_Sans-SemiBold.ttf
        - asset: assets/fonts/DM_Sans-Bold.ttf